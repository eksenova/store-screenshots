<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 1414" fill="none">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="830" y2="1414" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2e2e32"/>
      <stop offset="1" stop-color="#1e1e22"/>
    </linearGradient>
    <mask id="m">
      <rect width="830" height="1414" rx="80" fill="white"/>
      <rect x="40" y="40" width="750" height="1334" rx="8" fill="black"/>
    </mask>
  </defs>
  <rect x="1" y="1" width="828" height="1412" rx="80" stroke="#3a3a3e" stroke-width="2"/>
  <rect width="830" height="1414" rx="80" fill="url(#body)" mask="url(#m)"/>
  <rect x="39" y="39" width="752" height="1336" rx="9" stroke="#111" stroke-width="2" fill="none"/>
  <!-- Top speaker -->
  <rect x="345" y="16" width="140" height="8" rx="4" fill="#111"/>
  <!-- Front camera -->
  <circle cx="415" cy="16" r="6" fill="#111" opacity="0.5"/>
  <!-- Home button (Touch ID) -->
  <circle cx="415" cy="1390" r="38" stroke="#333" stroke-width="3" fill="none"/>
  <circle cx="415" cy="1390" r="32" stroke="#222" stroke-width="1.5" fill="none"/>
  <!-- Side buttons -->
  <rect x="827" y="350" width="6" height="100" rx="3" fill="#333"/>
  <rect x="-3" y="290" width="6" height="80" rx="3" fill="#333"/>
  <rect x="-3" y="385" width="6" height="80" rx="3" fill="#333"/>
  <rect x="-3" y="230" width="6" height="40" rx="3" fill="#333"/>
  <!-- Bottom -->
  <rect x="370" y="1396" width="90" height="8" rx="4" fill="#111"/>
  <circle cx="280" cy="1400" r="3" fill="#111"/>
  <circle cx="293" cy="1400" r="3" fill="#111"/>
  <circle cx="306" cy="1400" r="3" fill="#111"/>
  <circle cx="524" cy="1400" r="3" fill="#111"/>
  <circle cx="537" cy="1400" r="3" fill="#111"/>
  <circle cx="550" cy="1400" r="3" fill="#111"/>
</svg>
