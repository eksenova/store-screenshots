  <rect x="1765" y="420" width="6" height="80" rx="3" fill="#333"/>
  <rect x="1765" y="520" width="6" height="80" rx="3" fill="#333"/>
  <!-- USB-C bottom -->
  <rect x="814" y="2474" width="140" height="9" rx="4.5" fill="#111"/>
  <!-- Speaker grilles -->
  <circle cx="680" cy="2478" r="3" fill="#111"/>
  <circle cx="694" cy="2478" r="3" fill="#111"/>
  <circle cx="708" cy="2478" r="3" fill="#111"/>
  <circle cx="722" cy="2478" r="3" fill="#111"/>
  <circle cx="1046" cy="2478" r="3" fill="#111"/>
  <circle cx="1060" cy="2478" r="3" fill="#111"/>
  <circle cx="1074" cy="2478" r="3" fill="#111"/>
  <circle cx="1088" cy="2478" r="3" fill="#111"/>
  <!-- Top speakers -->
  <circle cx="680" cy="10" r="3" fill="#111"/>
  <circle cx="694" cy="10" r="3" fill="#111"/>
  <circle cx="708" cy="10" r="3" fill="#111"/>
  <circle cx="722" cy="10" r="3" fill="#111"/>
  <circle cx="1046" cy="10" r="3" fill="#111"/>
  <circle cx="1060" cy="10" r="3" fill="#111"/>
  <circle cx="1074" cy="10" r="3" fill="#111"/>
  <circle cx="1088" cy="10" r="3" fill="#111"/>
