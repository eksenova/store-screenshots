<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1768 2488" fill="none">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1768" y2="2488" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a2a2e"/>
      <stop offset="1" stop-color="#1a1a1e"/>
    </linearGradient>
    <mask id="m">
      <rect width="1768" height="2488" rx="46" fill="white"/>
      <rect x="50" y="50" width="1668" height="2388" rx="16" fill="black"/>
    </mask>
  </defs>
  <rect x="1" y="1" width="1766" height="2486" rx="46" stroke="#3a3a3e" stroke-width="2"/>
  <rect width="1768" height="2488" rx="46" fill="url(#body)" mask="url(#m)"/>
  <rect x="49" y="49" width="1670" height="2390" rx="17" stroke="#111" stroke-width="2" fill="none"/>
  <!-- Face ID camera -->
  <circle cx="884" cy="24" r="5" fill="#111"/>
  <circle cx="884" cy="24" r="2.5" fill="#1a2a4a" opacity="0.6"/>
