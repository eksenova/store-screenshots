<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 3200" fill="none">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1520" y2="3200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#28282c"/>
      <stop offset="1" stop-color="#1a1a1e"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="3200" gradientUnits="userSpaceOnUse">
