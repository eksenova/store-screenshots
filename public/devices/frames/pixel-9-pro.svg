<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1424 3072" fill="none">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1424" y2="3072" gradientUnits="userSpaceOnUse">
